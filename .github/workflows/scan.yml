name: Daily Squeeze Scan

on:
  schedule:
    # 21:30 UTC, weekdays. That's ~30 min after the US close in winter (EST) and
    # ~90 min after in summer (EDT) — late enough that the daily bar is finalized.
    - cron: "30 21 * * 1-5"
  workflow_dispatch: {}   # manual "Run workflow" button

permissions:
  contents: write          # to commit out/ back to the repo

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scan + notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m scanner.run --watchlist watchlist.csv --out out

      - name: Commit results for the dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add out/
          git diff --staged --quiet || git commit -m "scan results $(date -u +%Y-%m-%d)"
          git push
